<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aether Wellness</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body class="min-h-screen bg-stone-50 font-body text-slate-800 antialiased">

  <div id="splashScreen" class="fixed inset-0 z-[100] flex flex-col items-center justify-center bg-white transition-opacity duration-1000">
    <h1 class="font-display text-6xl font-bold tracking-tighter text-teal-600 animate-pulse">Aether</h1>
    <p class="mt-4 text-slate-400 tracking-widest uppercase text-xs font-semibold">Finding your calm</p>
  </div>

  <div class="pointer-events-none fixed inset-0 -z-10 overflow-hidden">
    <div class="absolute -top-28 -left-24 h-72 w-72 rounded-full bg-teal-200/45 blur-3xl"></div>
    <div class="absolute top-24 right-0 h-80 w-80 rounded-full bg-sky-200/35 blur-3xl"></div>
    <div class="absolute inset-0 bg-[radial-gradient(circle_at_center,rgba(255,255,255,0.65),transparent_62%)]"></div>
  </div>

  <main id="mainApp" class="opacity-0 transition-opacity duration-700 mx-auto grid w-[min(1100px,92vw)] grid-cols-1 gap-6 py-10 lg:grid-cols-12">

    <header class="relative overflow-hidden rounded-3xl border border-slate-200 bg-white/85 p-8 shadow-xl backdrop-blur lg:col-span-5">
      <p class="text-xs font-semibold uppercase tracking-[0.24em] text-slate-500">Student Wellness Companion</p>
      <h1 class="mt-2 font-display text-5xl font-bold tracking-tight text-slate-900">Aether Check-In</h1>
      <p class="mt-4 text-slate-600">Log how you feel and get 3 custom activities.</p>
      <div class="mt-6 flex flex-wrap gap-2">
        <span class="rounded-full border border-teal-200 bg-teal-50 px-3 py-1 text-xs font-semibold text-teal-700">Daily check-ins</span>
        <span class="rounded-full border border-sky-200 bg-sky-50 px-3 py-1 text-xs font-semibold text-sky-700">Actionable steps</span>
      </div>
    </header>

    <section class="rounded-3xl border border-slate-200 bg-white/85 p-8 shadow-xl backdrop-blur lg:col-span-7">
      <h2 class="font-display text-2xl font-semibold text-slate-900">How are you feeling right now?</h2>
      <div id="moodChoices" class="mt-6 grid grid-cols-2 gap-3 sm:grid-cols-4"></div>

      <textarea id="noteInput" rows="3" class="mt-6 w-full rounded-2xl border border-slate-200 p-4 outline-none focus:ring-2 focus:ring-teal-200" placeholder="Optional: What's on your mind?"></textarea>

      <button id="generateBtn" class="mt-6 w-full rounded-full bg-slate-900 py-4 text-white font-bold hover:bg-slate-800 transition shadow-lg">Get Recommendations</button>
    </section>

    <section id="quoteSection" class="hidden perspective-1000 min-h-[350px] lg:col-span-12">
      <div id="flipCard" class="relative w-full h-full transition-transform duration-700 transform-style-3d cursor-pointer min-h-[300px]">
        <div class="absolute inset-0 backface-hidden flex flex-col items-center justify-center bg-gradient-to-br from-teal-500 to-sky-600 rounded-3xl shadow-xl p-8 text-center text-white">
          <div class="text-5xl mb-4">✨</div>
          <h3 class="text-2xl font-bold">A message for you... Tap to reveal</h3>
        </div>
        <div class="absolute inset-0 backface-hidden rotate-y-180 flex flex-col items-center justify-center bg-white border-2 border-teal-100 rounded-3xl p-8 shadow-xl text-center">
          <p id="quoteText" class="text-2xl italic font-medium text-slate-800"></p>
          <p id="quoteAuthor" class="mt-4 font-bold text-teal-600 uppercase tracking-widest text-sm"></p>
          <button id="showActivitiesBtn" class="mt-6 px-10 py-3 bg-teal-600 text-white rounded-full font-bold">See Activities</button>
        </div>
      </div>
    </section>

    <section id="activitySection" class="hidden lg:col-span-12 mt-6">
      <div id="activityList" class="grid md:grid-cols-3 gap-6">
        </div>
    </section>

  </main>

  <script src="/static/app.js"></script>
</body>
</html>
